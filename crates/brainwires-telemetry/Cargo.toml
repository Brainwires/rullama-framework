[package]
name = "brainwires-telemetry"
description = "Unified telemetry for the Brainwires Agent Framework — analytics events, SQLite persistence, cost/usage queries, and a `BillingHook` trait consumed by `brainwires-billing`"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
keywords = ["ai-agents", "telemetry", "billing", "observability", "llm"]
categories = ["development-tools"]

[dependencies]
serde         = { workspace = true }
serde_json    = { workspace = true }
anyhow        = { workspace = true }
thiserror     = { workspace = true }
chrono        = { workspace = true }
uuid          = { workspace = true }
tokio         = { workspace = true, features = ["sync", "rt", "rt-multi-thread", "time", "macros"] }
async-trait   = { workspace = true }
tracing       = { workspace = true }
tracing-subscriber = { workspace = true, features = ["registry"] }
rusqlite      = { workspace = true, optional = true }
dirs          = { workspace = true, optional = true }

[dev-dependencies]
tokio    = { workspace = true, features = ["full", "test-util"] }
tempfile = { workspace = true }

[features]
default = ["native"]
native  = ["sqlite", "dep:dirs"]
sqlite  = ["dep:rusqlite"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
