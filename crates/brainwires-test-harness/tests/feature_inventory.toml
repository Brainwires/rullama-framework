# Feature-inventory manifest for the Brainwires test harness.
#
# Each [[feature]] block mirrors one heading in /FEATURES.md (##/###/####).
# The `xtask test-harness coverage` command diffs FEATURES.md against this
# manifest and fails CI on missing entries.
#
# Auto-generated stubs:
# - `crate_name` and `description` are placeholders — fill in manually.
# - `required_cases` is empty — Steps 9-10 populate Rust function paths.
# - Tier-A scope per user decision: all ~120 headings, no exemptions.
#
# Excluded from generation:
# - "## Table of Contents" (navigation, not a feature)
# - "## Extras & Standalone Binaries" and its subsections (consumer
#   projects, out of harness scope per CLAUDE memory
#   [[project_scope_crates_vs_extras]])

schema_version = 1

