[package]
name = "brainwires-tool-builtins"
description = "Built-in concrete tools for the Brainwires Agent Framework — bash, file_ops, git, web, search, code_exec, semantic_search, browser, email, calendar, system. Built on `brainwires-tool-runtime`."
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme.workspace = true
documentation = "https://docs.rs/brainwires-tool-builtins"
keywords = ["ai-tools", "builtin-tools", "bash", "git", "file-operations"]
categories = ["development-tools"]

[lib]
name = "brainwires_tool_builtins"
path = "src/lib.rs"

[dependencies]
brainwires-core.workspace = true
brainwires-tool-runtime = { workspace = true }

# Serialization / errors / async
serde = { workspace = true }
serde_json = { workspace = true }
anyhow.workspace = true
thiserror = { workspace = true }
async-trait.workspace = true

# Async runtime — features expanded by `native`/`wasm`
tokio = { version = "1.43", features = ["time"] }

# Always-available utilities
regex = "1"
sha2 = { workspace = true }
hex = { workspace = true }
uuid = { workspace = true }
tracing.workspace = true

# Native-only tools (bash / file_ops / git / web / search) ─────────────
walkdir = { version = "2", optional = true }
diffy = { version = "0.4", optional = true }
glob = { version = "0.3", optional = true }
ignore = { version = "0.4", optional = true }
git2 = { version = "0.20", optional = true }
reqwest = { workspace = true, optional = true }
zeroize = { version = "1", features = ["derive"], optional = true }

# Email tools (behind email feature) ────────────────────────────────────
lettre = { version = "0.11", default-features = false, features = ["tokio1-native-tls", "smtp-transport", "builder"], optional = true }
async-imap = { version = "0.11", default-features = false, features = ["runtime-tokio"], optional = true }
imap-proto = { version = "0.16", optional = true }
tokio-native-tls = { version = "0.3", optional = true }
native-tls = { version = "0.2", optional = true }
futures = { workspace = true, optional = true }
mailparse = { version = "0.15", optional = true }
base64 = { version = "0.22", optional = true }
jsonwebtoken = { version = "9", optional = true }
parking_lot = { version = "0.12", optional = true }
urlencoding = { version = "2", optional = true }

# Calendar tools (behind calendar feature) ──────────────────────────────
icalendar = { version = "0.16", optional = true }

# Timestamps used by gmail_push (behind email feature)
chrono = { workspace = true, optional = true }

# Cross-crate optional deps ─────────────────────────────────────────────
brainwires-rag = { workspace = true, optional = true }
brainwires-mcp-client = { workspace = true, optional = true }

# System primitives (absorbed from brainwires-system) ───────────────────
notify = { version = "7", optional = true }

# Interpreter deps (absorbed from brainwires-code-interpreters) ─────────
rhai = { version = "1.23", default-features = false, features = ["serde", "std"], optional = true }
mlua = { version = "0.10.3", features = ["lua54", "vendored"], optional = true }
boa_engine = { version = "0.21", optional = true }
tempfile = { version = "3", optional = true }
# wasm interpreter bindings
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", features = ["console"], optional = true }
getrandom = { version = "0.2", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }

# Seccomp-bpf sandbox (Linux only) — used by `BashSandboxMode::NetworkDeny` to
# deny network syscalls in the child process via a pre_exec hook.
[target.'cfg(target_os = "linux")'.dependencies]
seccompiler = "0.5"
libc = "0.2"

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile = "3"
proptest.workspace = true

[features]
default = ["native"]

# Native enables filesystem + process operations for the always-available
# builtins (bash / file_ops / git / web / search) and propagates `native`
# into the runtime.
native = [
    "dep:git2", "dep:walkdir", "dep:ignore", "dep:reqwest",
    "dep:glob", "dep:diffy", "dep:zeroize",
    "tokio/process", "tokio/fs",
    "brainwires-core/native",
    "brainwires-tool-runtime/native",
]
wasm = [
    "brainwires-core/wasm",
    "brainwires-tool-runtime/wasm",
]

# RAG-powered semantic_search
rag = [
    "dep:brainwires-rag",
    "brainwires-tool-runtime/rag",
]

# Multi-language interpreters (code_exec.rs)
interpreters = ["interpreters-rhai", "interpreters-lua"]
interpreters-rhai = ["dep:rhai"]
interpreters-lua = ["dep:mlua"]
interpreters-js = ["dep:boa_engine"]
interpreters-all = ["interpreters-rhai", "interpreters-lua", "interpreters-js"]
interpreters-wasm = ["dep:wasm-bindgen", "dep:js-sys", "dep:web-sys", "dep:getrandom", "dep:serde-wasm-bindgen"]

email = [
    "dep:lettre",
    "dep:async-imap",
    "dep:imap-proto",
    "dep:tokio-native-tls",
    "dep:native-tls",
    "dep:futures",
    "dep:mailparse",
    "dep:base64",
    "dep:jsonwebtoken",
    "dep:parking_lot",
    "dep:reqwest",
    "dep:chrono",
    "dep:urlencoding",
]
calendar = ["dep:icalendar", "dep:reqwest", "dep:urlencoding"]
browser = ["dep:brainwires-mcp-client", "native"]

# Passthrough features to brainwires-tool-runtime so `BuiltinToolExecutor`'s
# dispatch can `#[cfg(feature = "orchestrator")]` the orchestrator branch on
# when the consumer enables it via this façade.
orchestrator = ["brainwires-tool-runtime/orchestrator"]
orchestrator-wasm = ["brainwires-tool-runtime/orchestrator-wasm"]

# OS-level primitives — filesystem event watching and service management.
system = ["dep:notify"]
reactor = ["system"]
services = ["system"]
system-full = ["system"]

full = ["rag", "interpreters", "email", "calendar", "browser", "system"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
