[package]
name = "rullama-memory"
description = "Tiered hot/warm/cold agent memory orchestration for the rullama agent framework — `TieredMemory` multi-factor adaptive search across the schema stores in `rullama-stores`, plus the `dream` offline consolidation engine (summarisation, fact extraction, tier demotion)."
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/rullama-memory"
keywords = ["agent-memory", "tiered-memory", "consolidation", "rag", "lancedb"]
categories = ["database"]

[dependencies]
# Internal — schema stores and the substrate they sit on
rullama-core = { workspace = true }
rullama-storage = { workspace = true, features = ["native"] }
rullama-stores = { workspace = true, default-features = false, features = ["memory"] }

# Async runtime
tokio = { version = "1.43", features = ["sync", "time"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow.workspace = true

# Identifiers & time
uuid.workspace = true
chrono.workspace = true

# Async traits
async-trait.workspace = true

# Logging
tracing.workspace = true

# Offline-consolidation deps (dream feature)
futures = { workspace = true, optional = true }

# Optional telemetry hook for dream (DreamCycle event recording)
rullama-telemetry = { workspace = true, optional = true }

[features]
default = []

# Offline consolidation engine — produces summaries / facts and demotes
# tiers. Pulls `futures` for the async cycle plumbing.
dream = ["dep:futures"]

# Wire dream's `with_analytics` hook to rullama-telemetry's AnalyticsCollector
telemetry = ["dream", "dep:rullama-telemetry"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile.workspace = true
rullama-test-fixtures = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
