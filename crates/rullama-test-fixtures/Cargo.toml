[package]
name = "rullama-test-fixtures"
description = "Internal test fixtures for the Brainwires Agent Framework — shared mock providers, recording wrappers, tool registries, and sandbox helpers used across crate test suites."
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false

[dependencies]
rullama-core = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tokio = { version = "1.43", features = ["sync", "rt", "macros"] }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
