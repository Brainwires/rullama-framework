[package]
name = "rullama"
version = "0.1.0"
edition = "2024"
rust-version = "1.91"
description = "Browser-PWA Gemma 4 inference engine: Rust + wgpu + WASM."
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wgpu = { workspace = true }
bytemuck = { workspace = true }
half = { workspace = true }
thiserror = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
futures-channel = { workspace = true }
async-trait = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
pollster = { workspace = true }
env_logger = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
serde-wasm-bindgen = { workspace = true }
js-sys = { workspace = true }
web-sys = { workspace = true, features = [
    "Navigator",
    "Window",
    "WorkerGlobalScope",
    "WorkerNavigator",
    "Gpu",
    "GpuAdapter",
    "GpuDevice",
    "Headers",
    "Request",
    "RequestInit",
    "Response",
] }
console_error_panic_hook = { workspace = true }
console_log = { workspace = true }
# Dogfood Brainwires' own SQLite-in-Rust port. wasm-pack inlines its
# #[wasm_bindgen] exports (WasmDatabase) into pkg/rullama.js alongside
# our Model bindings, so the PWA's inference worker can persist chat
# history without a second wasm package.
rsqlite-wasm = { workspace = true }

[features]
default = []
# Reserved: was used to feature-gate the CPU reference forward; that path is now
# always built since the GPU forward shares KvState/Weights with it. The flag is
# kept (no-op) so existing `cargo test --features cpu-reference` invocations
# keep working without a script bump.
cpu-reference = []
