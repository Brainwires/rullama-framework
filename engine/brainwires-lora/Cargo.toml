[package]
name = "rullama-finetune"
version = "0.1.0"
description = "Local LoRA fine-tuning for the rullama Rust runtime, built natively on rullama's wgpu kernels. Native-only; the crate is empty on wasm32. Currently a skeleton — see MIGRATION-REPORT.md for context."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
keywords = ["lora", "fine-tuning", "wgpu", "gemma"]
categories = ["artificial-intelligence"]

[lib]
name = "rullama_finetune"
path = "src/lib.rs"

# All deps are cfg-gated to non-wasm32; the crate body is also
# #![cfg(not(target_arch = "wasm32"))] so on wasm32 it compiles to an
# empty crate. Burn-* and Safetensors deps are gone with the teardown;
# the rebuild adds wgpu (via rullama-core) plus a thin set of utilities.

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokenizers = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tempfile = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
