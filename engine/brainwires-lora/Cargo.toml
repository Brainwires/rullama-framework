[package]
name = "rullama-finetune"
version = "0.1.0"
description = "Local PEFT fine-tuning (LoRA / QLoRA / DoRA) for the rullama Rust runtime — Burn-backed (CPU/WGPU) with safetensors checkpointing. Native-only; the crate is empty on wasm32. Vendored from brainwires-finetune-local."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
keywords = ["lora", "qlora", "dora", "burn", "fine-tuning"]
categories = ["artificial-intelligence"]

[lib]
name = "rullama_finetune"
path = "src/lib.rs"

# All deps are cfg-gated to non-wasm32; the crate body is also
# #![cfg(not(target_arch = "wasm32"))] so on wasm32 it compiles to an
# empty crate without trying to drag Burn through wasm-bindgen.

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }

tokio = { workspace = true, features = ["sync", "time", "rt", "rt-multi-thread", "macros"] }
# Burn ML framework — individual crates instead of the umbrella `burn`.
burn-core = { workspace = true }
burn-nn = { workspace = true }
burn-optim = { workspace = true }
burn-autodiff = { workspace = true }
burn-wgpu = { workspace = true }
burn-ndarray = { workspace = true }
tokenizers = { workspace = true }
safetensors = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[[example]]
name = "local_training"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
