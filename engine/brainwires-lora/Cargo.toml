[package]
name        = "rullama-finetune"
version     = "0.2.0"
description = "Local LoRA fine-tuning for the rullama Rust runtime, built natively on rullama's wgpu kernels. Native-only; compiles to an empty crate on wasm32. Experimental — M3 skeleton, see the workspace README for status."
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
authors.workspace      = true
readme      = "../../README.md"
keywords    = ["lora", "fine-tuning", "wgpu", "gemma"]
categories  = ["science"]
# Inherits `publish = true` from the workspace. In practice this crate
# cannot reach crates.io until `rullama` is published first — its path
# dep on `rullama` needs a resolvable crates.io version too.
publish.workspace = true

[lib]
name = "rullama_finetune"
path = "src/lib.rs"

# All deps are cfg-gated to non-wasm32; the crate body is also
# #![cfg(not(target_arch = "wasm32"))] so on wasm32 it compiles to an
# empty crate. Burn-* and Safetensors deps are gone with the teardown;
# the rebuild adds wgpu (via rullama-core) plus a thin set of utilities.

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# `version` is required (alongside `path`) so this dep resolves on
# crates.io after the next `rullama` publish; locally cargo prefers the
# path entry.
rullama = { path = "../rullama", version = "0.2" }
wgpu = { workspace = true }
bytemuck = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokenizers = { workspace = true }
futures-channel = { workspace = true }
half = { workspace = true }
safetensors = "0.4"

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tempfile = { workspace = true }
pollster = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
