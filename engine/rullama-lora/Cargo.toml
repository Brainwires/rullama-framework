[package]
name        = "rullama-lora"
version     = "0.6.0"
description = "Local LoRA fine-tuning for the rullama engine, built on rullama-engine's wgpu kernels. Compiles for native and wasm32; browser harness lives in web."
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
authors.workspace      = true
readme      = "../README.md"
keywords    = ["lora", "fine-tuning", "wgpu", "gemma"]
categories  = ["science"]
# Inherits `publish = true` from the workspace. In practice this crate
# cannot reach crates.io until `rullama-engine` is published first — its
# path dep on `rullama-engine` needs a resolvable crates.io version too.
publish.workspace = true

[lib]
name = "rullama_lora"
path = "src/lib.rs"
# `cdylib` lets wasm-pack build this crate as the wasm-bindgen entry
# point — the PWA bundle picks up both the inference-side Model
# exports (from rullama-engine) and the TrainingSession exports here.
# `rlib` keeps the crate usable as a regular Rust dependency from
# native examples + integration tests.
crate-type = ["cdylib", "rlib"]

# Core deps are portable Rust + wgpu, all of which compile to wasm32.
# `tempfile`, `pollster`, and the path-based test+example wrappers
# stay native-only — they're tools for the CLI surface, not the trainer.
[dependencies]
# `version` is required (alongside `path`) so this dep resolves on
# crates.io after the next `rullama-engine` publish; locally cargo prefers
# the path entry.
rullama-engine = { path = "../rullama-engine", version = "0.6" }
wgpu = { workspace = true }
bytemuck = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
futures-channel = { workspace = true }
half = { workspace = true }
safetensors = "0.4"

# Native-only: HF `tokenizers` pulls `getrandom@0.3` which doesn't build
# for wasm32-unknown-unknown without backend cfg. Browser callers route
# tokenisation through the rullama `Model.encodeTokens` API instead.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokenizers = { workspace = true }

# Wasm-bindgen training surface — only compiled for browser builds.
# The `wasm-bindgen` / `js-sys` / `serde-wasm-bindgen` versions track
# the rullama crate's pins so JS sees a single, coherent ABI.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
serde-wasm-bindgen = { workspace = true }
js-sys = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tempfile = { workspace = true }
pollster = { workspace = true }

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
