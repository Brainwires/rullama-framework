[package]
name = "agent-chat"
publish = false
description = "Simplified AI chat client for the rullama"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[[bin]]
name = "agent-chat"
path = "src/main.rs"

[dependencies]
rullama-core.workspace = true
rullama-provider.workspace = true
rullama-agent.workspace = true
rullama-tool-runtime = { workspace = true }
rullama-tool-builtins = { workspace = true }

tokio = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = { workspace = true }
toml = { workspace = true }
dirs = { workspace = true }
async-trait = { workspace = true }

clap = { version = "4", features = ["derive", "env"] }
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }
rpassword = "5"

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = []
bedrock = ["rullama-provider/bedrock"]
vertex-ai = ["rullama-provider/vertex-ai"]
