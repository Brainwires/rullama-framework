[package]
name = "audio-demo-ffi"
description = "UniFFI bindings for rullama-hardware — exposes TTS/STT to C#, Kotlin, Swift, Python"
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]
name = "audio_demo_ffi"

[dependencies]
rullama-hardware = { workspace = true, features = ["audio"] }
rullama-provider = { workspace = true }
uniffi = { version = "0.29", features = ["cli"] }
tokio = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }

[build-dependencies]
uniffi = { version = "0.29", features = ["build"] }
