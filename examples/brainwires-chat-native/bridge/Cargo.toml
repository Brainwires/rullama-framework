[package]
name = "brainwires-chat-native-bridge"
description = "uniffi FFI bridge exposing the brainwires framework to React Native (Kotlin/Swift) and to react-native-windows/macos hosts."
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]
name = "brainwires_chat_native_bridge"

[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"

[dependencies]
uniffi = { version = "0.29", features = ["cli"] }

# Framework crates wired in incrementally as features need them.
# Start small to keep mobile cross-compile fast; add more as the chat app
# port pulls them in.
# brainwires-core = { workspace = true }

[build-dependencies]
uniffi = { version = "0.29", features = ["build"] }
