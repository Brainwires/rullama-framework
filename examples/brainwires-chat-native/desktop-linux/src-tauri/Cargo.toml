[package]
name = "brainwires-chat-native-linux"
version = "0.1.0"
edition = "2021"
publish = false
description = "Tauri 2 host wrapping the brainwires-chat-native RN-Web build for Linux."

# Isolated from the parent cargo workspace — Tauri pulls heavy GUI deps
# (webkit2gtk-sys, etc.) we don't want pulled into framework-wide builds.
[workspace]

[lib]
name = "brainwires_chat_native_linux_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Direct link into the framework bridge (Rust-host: no uniffi/FFI hop on Linux).
brainwires-chat-native-bridge = { path = "../../bridge" }

[features]
# Used by tauri-build to pin to the production frontend dist on release builds.
custom-protocol = ["tauri/custom-protocol"]
