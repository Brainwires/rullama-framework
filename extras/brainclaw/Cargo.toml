[workspace]
members = [
    "daemon",
    "gateway",
    "mcp-discord",
    "mcp-github",
    "mcp-telegram",
    "mcp-slack",
    "mcp-skill-registry",
    "mcp-whatsapp",
    "mcp-matrix",
    "mcp-mattermost",
    "mcp-signal",
    "mcp-google-chat",
    "mcp-teams",
    "mcp-irc",
    "mcp-imessage",
    "mcp-nextcloud-talk",
    "mcp-line",
    "mcp-feishu",
]
resolver = "2"

[workspace.package]
version = "0.11.0"
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.91"
repository = "https://github.com/Brainwires/brainwires-framework"
homepage = "https://github.com/Brainwires/brainwires-framework"
authors = ["Brainwires"]
publish = false

[workspace.dependencies]
# Brainwires framework crates (path deps to monorepo)
brainwires-core = { path = "../../crates/brainwires-core" }
brainwires-agent = { path = "../../crates/brainwires-agent", features = ["skills-registry"] }
brainwires-providers = { path = "../../crates/brainwires-providers", default-features = false, features = ["native"] }
brainwires-tools = { path = "../../crates/brainwires-tools", version = "0.10.0" }
brainwires-network = { path = "../../crates/brainwires-network", features = ["channels"] }
# skills now part of brainwires-agent
brainwires-hardware = { path = "../../crates/brainwires-hardware" }
brainwires-gateway = { path = "gateway" }
brainwires-telemetry = { path = "../../crates/brainwires-telemetry", default-features = false }

# Async runtime & utilities
tokio = { version = "1.43", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"

# Identifiers & time
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP
reqwest = { version = "0.12", features = ["json", "stream"] }
axum = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# WebSocket
tokio-tungstenite = { version = "0.26", features = ["native-tls"] }

# Discord API
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "model", "cache", "rustls_backend", "chrono"] }

# Matrix SDK
matrix-sdk = { version = "0.10", default-features = false, features = ["native-tls", "markdown"] }

# Telegram Bot API
teloxide = { version = "0.13", features = ["macros"] }

# MCP protocol
rmcp = { version = "1.1", features = ["client", "server", "client-side-sse", "transport-child-process", "transport-io", "macros"] }

# MCP server support
schemars = "1.0"
tokio-util = "0.7"

# Config
toml = "1.0"
clap = { version = "4", features = ["derive", "env"] }

# Filesystem
dirs = "6"

# Concurrent maps
dashmap = "6"

# Regex
regex = "1"

# URL parsing
url = "2.5"

# SQLite
rusqlite = { version = "0.38", features = ["bundled"] }

# Semantic versioning
semver = { version = "1", features = ["serde"] }

# Cron expression parsing
cron = "0.12"

# Stream adapters
tokio-stream = "0.1"

# Base64 encoding/decoding
base64 = "0.22"

# Hashing & HMAC
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"

# Testing
tempfile = "3"

# Interactive CLI prompts (onboarding wizard)
dialoguer = "0.11"

# CSPRNG for admin-token generation
rand = "0.9"

# JWT verification & signing (Google Chat / Teams adapters)
jsonwebtoken = "9.3"

# Lock-free / read-optimised locks (JWKs cache)
parking_lot = "0.12"

# URL encoding (Google Chat API endpoints)
urlencoding = "2.1"

# IRC client (mcp-irc)
irc = { version = "1.1", default-features = false, features = ["tls-native", "ctcp"] }
irc-proto = { version = "1.1", default-features = false, features = ["tokio"] }
