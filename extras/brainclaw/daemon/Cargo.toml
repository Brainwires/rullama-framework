[package]
name = "brainclaw"
description = "BrainClaw — personal AI assistant daemon built on the Brainwires Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
publish.workspace = true

[lib]
name = "brainclaw"
path = "src/lib.rs"

[[bin]]
name = "brainclaw"
path = "src/main.rs"
doc = false

[dependencies]
brainwires-gateway.workspace = true
brainwires-agent.workspace = true
brainwires-providers.workspace = true
brainwires-tools.workspace = true
brainwires-network.workspace = true
brainwires-core.workspace = true
brainwires-sandbox = { path = "../../../crates/brainwires-sandbox", default-features = false, features = ["docker"], optional = true }
brainwires-hardware = { workspace = true, optional = true, features = ["audio"] }

tokio.workspace = true
async-trait.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
clap.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
anyhow.workspace = true
uuid.workspace = true
chrono.workspace = true
dirs.workspace = true
cron.workspace = true
reqwest.workspace = true
dialoguer.workspace = true
rand.workspace = true
hex.workspace = true
sha2.workspace = true

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["test-util"] }
futures.workspace = true

[features]
default = ["native-tools", "sandbox"]
native-tools = ["brainwires-tools/native"]
email = ["brainwires-tools/email"]
# Gmail push ingestion via Google Pub/Sub (OpenClaw parity P3.1).
email-push = ["brainwires-tools/email", "brainwires-gateway/email-push"]
calendar = ["brainwires-tools/calendar"]
rag = ["brainwires-tools/rag"]
browser = ["brainwires-tools/browser"]
voice = ["dep:brainwires-hardware", "brainwires-gateway/voice"]
# Local Whisper-based STT (requires the hardware crate's `local-stt` feature).
local-stt = ["voice", "brainwires-hardware/local-stt"]
# Route dangerous tool calls (bash, code_exec) through a container sandbox.
sandbox = ["dep:brainwires-sandbox", "brainwires-tools/sandbox"]
# Opt-in: allow host-sandbox (no isolation) — dev only, dangerous.
sandbox-unsafe-host = ["sandbox", "brainwires-sandbox/unsafe-host"]
