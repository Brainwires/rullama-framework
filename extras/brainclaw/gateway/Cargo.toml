[package]
name = "brainwires-gateway"
description = "Gateway daemon — always-on WebSocket server that routes messages between channel MCP servers and agent sessions"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true

[lib]
name = "brainwires_gateway"
path = "src/lib.rs"

[[bin]]
name = "brainwires-gateway"
path = "src/main.rs"
doc = false

[dependencies]
brainwires-agent.workspace = true
brainwires-network.workspace = true
brainwires-core.workspace = true
brainwires-tools = { workspace = true, features = ["sessions"] }
tokio.workspace = true
axum = { workspace = true, features = ["ws"] }
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
clap.workspace = true
dashmap.workspace = true
anyhow.workspace = true
async-trait.workspace = true
futures.workspace = true
regex.workspace = true
reqwest.workspace = true
sha2.workspace = true
hmac.workspace = true
hex.workspace = true
dirs.workspace = true
tokio-stream.workspace = true
cron.workspace = true
brainwires-hardware = { workspace = true, optional = true, features = ["audio"] }
brainwires-telemetry = { workspace = true, optional = true }

[features]
voice = ["dep:brainwires-hardware"]
telemetry = ["dep:brainwires-telemetry", "brainwires-telemetry/native"]
# Gmail push webhook + handler plumbing. Pulls the `email` feature of
# brainwires-tools (which is where `GmailPushHandler` lives).
email-push = ["brainwires-tools/email"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tempfile.workspace = true
tokio-tungstenite.workspace = true
futures-util = "0.3"
# Test-only: sign Google-like Pub/Sub push JWTs in `tests/gmail_push_integration.rs`.
jsonwebtoken = "9"
base64 = "0.22"
