[package]
name = "brainclaw-mcp-google-chat"
description = "Google Chat channel adapter for BrainClaw — bot framework webhook ingress, Chat REST API egress"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true

[lib]
name = "brainwires_google_chat_channel"
path = "src/lib.rs"

[[bin]]
name = "brainclaw-mcp-google-chat"
path = "src/main.rs"
doc = false

[dependencies]
brainwires-network.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
clap.workspace = true
anyhow.workspace = true
reqwest.workspace = true
axum.workspace = true
tokio-tungstenite.workspace = true
futures.workspace = true
rmcp.workspace = true
async-trait.workspace = true
schemars.workspace = true
sha2.workspace = true
hex.workspace = true
jsonwebtoken.workspace = true
parking_lot.workspace = true
urlencoding.workspace = true
base64.workspace = true

[dev-dependencies]
tempfile.workspace = true
rsa = { version = "0.9", features = ["pem"] }
# rsa 0.9 still pins rand_core 0.6, so use the matching rand release for
# tests — the workspace `rand = 0.9` is incompatible at the trait level.
rand_legacy = { package = "rand", version = "0.8" }
