# brainwires-chat-pwa — local & single-host deployment (production).
#
# Build context is the workspace root because the wasm crate depends on
# `../../../crates/brainwires-*`. Use the launcher:
#
#   ./web/start.sh prod   # docker compose up -d --build
#   ./web/start.sh dev    # adds docker-compose.dev.yml overlay (bind mount)
#
# Or invoke compose directly:
#
#   cp .env.example .env
#   docker compose up -d --build
#
# .env is auto-loaded by Docker Compose from this directory and is
# git-ignored. Variables not set in .env fall back to the defaults below.

services:
  chat-pwa:
    build:
      context: ../..
      dockerfile: extras/brainwires-chat-pwa/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        BUILD_COMMIT: ${BUILD_COMMIT:-}
        BUILD_VERSION: ${BUILD_VERSION:-0.1.0}
        DEV_MODE: ${DEV_MODE:-false}
    image: brainwires-chat-pwa:latest
    env_file:
      - path: .env
        required: false
    ports:
      - "${HOST_PORT:-8080}:80"
    volumes:
      # Optional Ollama models cache. When the host running this
      # container also runs the `ollama` daemon, set
      # OLLAMA_MODELS_DIR=/usr/share/ollama/.ollama/models in .env so
      # nginx can serve manifests + blobs straight off local disk
      # instead of round-tripping through registry.ollama.ai.
      #
      # When OLLAMA_MODELS_DIR is unset, this falls back to the named
      # volume `ollama-cache-empty` (defined at the bottom of this
      # file) — a docker-managed volume that starts empty. nginx's
      # `try_files` then falls through to the registry proxy
      # transparently for every request.
      - "${OLLAMA_MODELS_DIR:-ollama-cache-empty}:/var/ollama-cache:ro"
    environment:
      # Runtime overrides — entrypoint.sh rewrites build-info.js with
      # these values at container start.
      - BRAINWIRES_DEV_MODE=${DEV_MODE:-false}
      - BRAINWIRES_BUILD_DATE=${BUILD_DATE:-}
      - BRAINWIRES_BUILD_COMMIT=${BUILD_COMMIT:-}
      - BRAINWIRES_BUILD_VERSION=${BUILD_VERSION:-0.1.0}
    restart: unless-stopped

# Fallback empty volume for the OLLAMA_MODELS_DIR mount above. Only
# used when the env var isn't set; nginx sees an empty cache dir and
# falls through to the registry proxy for every request.
volumes:
  ollama-cache-empty:
    driver: local
