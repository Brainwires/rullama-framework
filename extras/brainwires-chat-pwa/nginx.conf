# brainwires-chat-pwa — static PWA served by nginx.
#
# No backend: the PWA talks directly to LLM providers (Anthropic, OpenAI,
# Gemini, Ollama) or runs a local model in-browser via WASM. Nginx only
# serves the static bundle.

# Safari < 16.4 does not support 'wasm-unsafe-eval' and requires full
# 'unsafe-eval' for WebAssembly. Detection: Safari sets `Version/X.Y` in
# the UA; Chrome/Firefox do not.
#
# connect-src includes https: + wss: so the PWA can reach
# api.anthropic.com, api.openai.com, generativelanguage.googleapis.com,
# huggingface.co (model downloads), and any user-configured Ollama
# endpoint. Tighten this list in deployments that lock the PWA to a
# single provider.
map $http_user_agent $content_security_policy {
    default              "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
    "~Version/1[0-5]\." "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
    "~Version/16\.0"    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
}

server {
    listen 80;
    server_name _;

    include /etc/nginx/mime.types;
    types {
        application/manifest+json webmanifest;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. Re-declared in any location { } that adds its own
    # add_header — nginx drops parent add_headers when a location overrides.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy $content_security_policy always;
    add_header Permissions-Policy "microphone=(self), camera=()" always;

    # Cross-Origin isolation — required for SharedArrayBuffer and the
    # high-resolution timers that some WASM model runtimes use.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # No HTML/JS caching at the origin — let Cloudflare or the SW handle
    # long-lived caching where appropriate. Fresh on every deploy.
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;

    # Service worker — must always be fresh and must declare its scope.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Security-Policy $content_security_policy always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Long-cache for the WASM blob — its hash is in the filename via
    # wasm-pack, so the SW invalidates it via SRI.
    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Compression. WASM and JS bundles are the bulk of the payload.
    gzip on;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        image/svg+xml;
    gzip_min_length 256;

    # registry.ollama.ai reverse proxy.
    #
    # The OCI Distribution Spec endpoints at `registry.ollama.ai` do not
    # send `Access-Control-Allow-Origin`, so a direct browser fetch from
    # `https://chat.brainwires.dev` is blocked by CORS. This same-origin
    # proxy strips the cross-origin problem: the PWA hits
    # `/ollama-registry/v2/library/<model>/manifests/<tag>` and nginx
    # forwards to `https://registry.ollama.ai/v2/...`.
    #
    # Notes:
    # - `Host` header is set explicitly so SNI + virtual-host routing
    #   still picks the right origin upstream.
    # - The `Authorization` header is intentionally not forwarded —
    #   public Ollama models don't require auth, and we don't want the
    #   PWA to be a bearer-token relay.
    # - Cross-Origin-Resource-Policy is overridden to `cross-origin`
    #   so the SW can fetch and re-cache the response (default
    #   `same-origin` blocks fetches initiated from the SW context).
    # - Range support is automatic with proxy_pass when `proxy_buffering`
    #   is off — large GGUF blobs (~7 GB for gemma4:e2b) need streamed
    #   transfer and resume-on-disconnect.
    location /ollama-registry/ {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
        proxy_pass https://registry.ollama.ai/;
        proxy_set_header Host registry.ollama.ai;
        proxy_set_header User-Agent "brainwires-chat-pwa/1.0";
        proxy_set_header Accept $http_accept;
        proxy_set_header Range $http_range;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";

        # Streaming downloads: do not buffer the body, do not impose a
        # response time limit beyond the connect/read window. GGUF
        # blobs are multi-GB and the registry responds at CDN speed.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # registry.ollama.ai redirects blob requests to a CDN host
        # (currently Cloudflare R2). Without `proxy_redirect`, the 307
        # would carry an absolute https://… Location pointing at a
        # cross-origin host the browser can't follow either. Rewrite
        # both common redirect shapes back into our same-origin path
        # so the browser re-issues the request through this proxy.
        proxy_redirect ~^https?://registry\.ollama\.ai/(.*)$ /ollama-registry/$1;
        proxy_redirect ~^https?://([^/]+)/(.*)$ /ollama-blob/$1/$2;

        # Pass status verbatim so 206 (Partial Content) on resume
        # reaches the JS Range reader without re-interpretation.
        proxy_intercept_errors off;

        # CORS-safe headers for the SW + main-thread fetchers.
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store" always;
    }

    # Catch-all proxy for blob redirects.
    #
    # `registry.ollama.ai` serves manifests directly but redirects blob
    # requests to whatever CDN host is currently authoritative (e.g.
    # `cdn.ollamacdn.com`, `registry.ollama.ai.r2.cloudflarestorage.com`).
    # The `proxy_redirect` rule above rewrites that absolute URL into
    # `/ollama-blob/<host>/<path>`; this location forwards to the
    # actual upstream host extracted from the path.
    location ~ ^/ollama-blob/([^/]+)/(.*)$ {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
        set $upstream_host $1;
        set $upstream_path $2;
        proxy_pass https://$upstream_host/$upstream_path$is_args$args;
        proxy_set_header Host $upstream_host;
        proxy_set_header User-Agent "brainwires-chat-pwa/1.0";
        proxy_set_header Accept $http_accept;
        proxy_set_header Range $http_range;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Follow further redirects (rare but possible on tiered CDNs).
        proxy_redirect ~^https?://([^/]+)/(.*)$ /ollama-blob/$1/$2;
        proxy_intercept_errors off;

        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store" always;
    }

    # SPA routing — fall back to index.html for any path that doesn't
    # match a static file.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
