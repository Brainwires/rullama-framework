# brainwires-chat-pwa — static PWA served by nginx.
#
# No backend: the PWA talks directly to LLM providers (Anthropic, OpenAI,
# Gemini, Ollama) or runs a local model in-browser via WASM. Nginx only
# serves the static bundle.

# Safari < 16.4 does not support 'wasm-unsafe-eval' and requires full
# 'unsafe-eval' for WebAssembly. Detection: Safari sets `Version/X.Y` in
# the UA; Chrome/Firefox do not.
#
# connect-src includes https: + wss: so the PWA can reach
# api.anthropic.com, api.openai.com, generativelanguage.googleapis.com,
# huggingface.co (model downloads), and any user-configured Ollama
# endpoint. Tighten this list in deployments that lock the PWA to a
# single provider.
map $http_user_agent $content_security_policy {
    default              "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
    "~Version/1[0-5]\." "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
    "~Version/16\.0"    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
}

server {
    listen 80;
    server_name _;

    include /etc/nginx/mime.types;
    types {
        application/manifest+json webmanifest;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. Re-declared in any location { } that adds its own
    # add_header — nginx drops parent add_headers when a location overrides.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy $content_security_policy always;
    add_header Permissions-Policy "microphone=(self), camera=()" always;

    # Cross-Origin isolation — required for SharedArrayBuffer and the
    # high-resolution timers that some WASM model runtimes use.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # No HTML/JS caching at the origin — let Cloudflare or the SW handle
    # long-lived caching where appropriate. Fresh on every deploy.
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;

    # Service worker — must always be fresh and must declare its scope.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Security-Policy $content_security_policy always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Long-cache for the WASM blob — its hash is in the filename via
    # wasm-pack, so the SW invalidates it via SRI.
    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Compression. WASM and JS bundles are the bulk of the payload.
    gzip on;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        image/svg+xml;
    gzip_min_length 256;

    # ── Ollama OCI registry / local-cache surface ─────────────────────
    #
    # The PWA fetches Ollama-format models via same-origin paths so it
    # doesn't trip CORS on `registry.ollama.ai` (which sends no
    # `Access-Control-Allow-Origin` header). Two layers:
    #
    #   1. **Local cache (preferred).** When the host running this
    #      container also runs `ollama` (the daemon), bind-mount its
    #      models dir to `/var/ollama-cache:ro`:
    #
    #        /usr/share/ollama/.ollama/models
    #          ├── manifests/registry.ollama.ai/library/<model>/<tag>
    #          └── blobs/sha256-<hex>
    #
    #      The location blocks below `try_files` against this cache
    #      first. Hit rate ~100% on a host that runs both the daemon
    #      and the chat-pwa: the GGUF blob streams off local disk at
    #      sendfile speed instead of pulling 7 GB through Cloudflare.
    #
    #   2. **Registry fallback.** If the cache miss (or no volume
    #      mounted), `try_files` falls through to `@ollama_remote`,
    #      which proxies to `https://registry.ollama.ai`. Same path,
    #      just slower.
    #
    # Both paths land on `/ollama-registry/v2/<scope>/manifests/<tag>`
    # and `/ollama-registry/v2/<scope>/blobs/sha256:<hex>` (the OCI
    # spec wire form). Rangeable downloads via `Accept-Ranges bytes`
    # for resume support; CRP override to `cross-origin` so the SW
    # can fetch + re-cache through the same proxy.

    # Local-cache: manifest. URL is `/v2/library/gemma4/manifests/e2b`;
    # disk is `/manifests/registry.ollama.ai/library/gemma4/e2b`.
    location ~ ^/ollama-registry/v2/(?<oci_scope>.+)/manifests/(?<oci_tag>[^/]+)$ {
        root /var/ollama-cache;
        try_files /manifests/registry.ollama.ai/$oci_scope/$oci_tag @ollama_remote;
        default_type application/vnd.docker.distribution.manifest.v2+json;
        add_header Content-Type application/vnd.docker.distribution.manifest.v2+json always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store" always;
    }

    # Local-cache: blob. URL has `sha256:<hex>` (nginx decodes %3A
    # before location matching, so the regex sees `:`). Disk uses
    # `sha256-<hex>` (dash, not colon — Ollama's on-disk convention).
    location ~ ^/ollama-registry/v2/.+/blobs/sha256:(?<oci_digest>[0-9a-f]+)$ {
        root /var/ollama-cache;
        try_files /blobs/sha256-$oci_digest @ollama_remote;
        default_type application/octet-stream;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "no-store" always;
    }

    # Anything else under /ollama-registry/ (e.g. /v2/ discovery
    # endpoint, tags listing) goes straight through the registry
    # proxy. `try_files` against a path that never exists on disk
    # forces fall-through to the named upstream location.
    location /ollama-registry/ {
        try_files /__never_local @ollama_remote;
    }

    # Named location: registry.ollama.ai reverse proxy. Reached via
    # `try_files ... @ollama_remote;` from the local-cache locations
    # above when a manifest/blob isn't on local disk, or directly
    # from the catch-all above for non-cached endpoints.
    location @ollama_remote {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;

        # Strip the `/ollama-registry/` prefix on its way upstream.
        # `break;` halts rewrite processing in this block but updates
        # `$uri` for the subsequent proxy_pass evaluation.
        rewrite ^/ollama-registry/(.*)$ /$1 break;

        # `proxy_pass` without a URI part forwards the (possibly
        # rewritten) `$uri` verbatim — exactly what we want here.
        proxy_pass https://registry.ollama.ai;

        # SNI is mandatory for Cloudflare-fronted hosts. Without
        # `proxy_ssl_server_name on`, the upstream rejects the
        # handshake → nginx surfaces 502 (which is the symptom that
        # showed up the first time we deployed this proxy).
        proxy_ssl_server_name on;
        proxy_ssl_name registry.ollama.ai;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;

        proxy_set_header Host registry.ollama.ai;
        proxy_set_header User-Agent "brainwires-chat-pwa/1.0";
        proxy_set_header Accept $http_accept;
        proxy_set_header Range $http_range;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # registry.ollama.ai 307s blob requests to a CDN host
        # (Cloudflare R2). Rewrite the absolute Location into a
        # same-origin URL: blobs go through `/ollama-blob/`, peer
        # registry paths loop back through this same proxy.
        #
        # Emit absolute HTTPS URLs (not path-only) so Cloudflare-proxied
        # deployments don't accidentally downgrade to HTTP. nginx behind
        # Cloudflare sees `$scheme = http` (the inner hop), and a
        # path-only Location resolved by some clients picks up that
        # inner scheme instead of the original HTTPS the browser used.
        # Hardcode `https://` here — this proxy is only sensible behind
        # an HTTPS terminator. `$host` carries the original Host header.
        proxy_redirect ~^https?://registry\.ollama\.ai/(.*)$ https://$host/ollama-registry/$1;
        proxy_redirect ~^https?://([^/]+)/(.*)$ https://$host/ollama-blob/$1/$2;
        proxy_intercept_errors off;

        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store" always;
    }

    # Catch-all proxy for blob redirects to non-registry hosts.
    location ~ ^/ollama-blob/(?<upstream_host>[^/]+)/(?<upstream_path>.*)$ {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
        proxy_pass https://$upstream_host/$upstream_path$is_args$args;

        proxy_ssl_server_name on;
        proxy_ssl_name $upstream_host;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;

        proxy_set_header Host $upstream_host;
        proxy_set_header User-Agent "brainwires-chat-pwa/1.0";
        proxy_set_header Accept $http_accept;
        proxy_set_header Range $http_range;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Same hardcoded-https logic as the registry proxy above —
        # tiered CDNs may issue further redirects we need to keep
        # same-origin and HTTPS.
        proxy_redirect ~^https?://([^/]+)/(.*)$ https://$host/ollama-blob/$1/$2;
        proxy_intercept_errors off;

        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store" always;
    }

    # SPA routing — fall back to index.html for any path that doesn't
    # match a static file.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
