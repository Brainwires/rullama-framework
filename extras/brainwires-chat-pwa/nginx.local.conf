# brainwires-chat-pwa — local user-mode nginx.
#
# Differences from prod nginx.conf:
#  - Top-level events/http/pid blocks (nginx -c expects a full config).
#  - Listen 8080 (no privileged-port escalation).
#  - root → resolved by NGINX_PWA_ROOT envvar at start-time, default
#    falls back to a sensible relative guess.
#  - /ollama-registry/ proxies to the local ~/.ollama/models cache via
#    NGINX_OLLAMA_CACHE.
#  - Logs + pid + temp paths under NGINX_RUN_DIR (defaulted to /tmp/...
#    by the wrapper script) so we never touch /var/run or
#    /var/log/nginx.
#  - No HTTPS — Playwright drives http://localhost:8080.

# Run nginx in the foreground (no daemon) so the wrapper can ^C it.
daemon off;

# Required at top level — points at a directory we can actually write to.
pid {{NGINX_RUN_DIR}}/nginx.pid;
error_log {{NGINX_RUN_DIR}}/error.log warn;

events {
    worker_connections 1024;
}

http {
    # Per-request scratch directories (must exist and be writable).
    client_body_temp_path {{NGINX_RUN_DIR}}/client_body_temp;
    proxy_temp_path       {{NGINX_RUN_DIR}}/proxy_temp;
    fastcgi_temp_path     {{NGINX_RUN_DIR}}/fastcgi_temp;
    uwsgi_temp_path       {{NGINX_RUN_DIR}}/uwsgi_temp;
    scgi_temp_path        {{NGINX_RUN_DIR}}/scgi_temp;
    access_log            {{NGINX_RUN_DIR}}/access.log;

    include {{NGINX_MIME_TYPES}};
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    types {
        application/manifest+json webmanifest;
        application/wasm wasm;
    }

    server {
        listen 8080;
        server_name localhost;

        root {{NGINX_PWA_ROOT}};
        index index.html;

        # Cross-Origin isolation — required for SharedArrayBuffer + the
        # high-resolution timers wgpu_compute_layer needs.
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # Don't cache HTML/JS during local testing — we redeploy as fast
        # as we can hit save.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;

        location = /sw.js {
            add_header Service-Worker-Allowed "/" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        location ~* \.wasm$ {
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }

        gzip on;
        gzip_types
            text/html
            text/css
            application/javascript
            application/json
            application/manifest+json
            application/wasm
            image/svg+xml;
        gzip_min_length 256;

        # ── Ollama OCI registry / local-cache surface ────────────────
        # Manifest + blob from the local ~/.ollama cache. No remote
        # fallback — if the user hasn't `ollama pull`ed gemma4:e2b,
        # the test fails fast with 404 instead of starting a 7 GB
        # download.

        # Manifest: /v2/<scope>/manifests/<tag>
        # Disk:     <cache>/manifests/registry.ollama.ai/<scope>/<tag>
        location ~ ^/ollama-registry/v2/(?<oci_scope>.+)/manifests/(?<oci_tag>[^/]+)$ {
            root {{NGINX_OLLAMA_CACHE}};
            try_files /manifests/registry.ollama.ai/$oci_scope/$oci_tag =404;
            default_type application/vnd.docker.distribution.manifest.v2+json;
            add_header Content-Type application/vnd.docker.distribution.manifest.v2+json always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Cache-Control "no-store" always;
        }

        # Blob: /v2/.../blobs/sha256:<hex> → <cache>/blobs/sha256-<hex>
        location ~ ^/ollama-registry/v2/.+/blobs/sha256:(?<oci_digest>[0-9a-f]+)$ {
            root {{NGINX_OLLAMA_CACHE}};
            try_files /blobs/sha256-$oci_digest =404;
            default_type application/octet-stream;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Accept-Ranges bytes always;
            add_header Cache-Control "no-store" always;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
