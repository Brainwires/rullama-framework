[package]
name = "brainwires-chat-pwa-wasm"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Framework crates — only `crates/*` allowed; never depend on other extras.
brainwires-core = { path = "../../../crates/brainwires-core", default-features = false, features = ["wasm"] }
brainwires-provider = { path = "../../../crates/brainwires-provider", default-features = false, features = ["local-llm-candle", "local-llm-vision", "candle-wgpu"] }
brainwires-provider-speech = { path = "../../../crates/brainwires-provider-speech", default-features = false, features = ["web-speech"] }
brainwires-llama = { path = "../../../crates/brainwires-llama" }

# Enable the WebGPU backend for wgpu. The candle fork declares wgpu with
# default-features=false (wgsl only, no backend). Since this crate always
# targets wasm32, we add the browser backend here.
wgpu = { version = "29", default-features = false, features = ["webgpu"] }

# Candle BERT (embedding model). Pulled in directly so we can use the
# `candle_transformers::models::bert::BertModel` API; `[patch.crates-io]`
# at the workspace root redirects this to the Brainwires candle fork
# (currently `v0.11-wgpu`).
candle-core = { version = "0.11", default-features = false }
candle-transformers = { version = "0.11", default-features = false, features = ["wasm-trace-quantized-gemma4"] }

# Candle NN — needed for the multimodal vision path which references
# `candle_nn::Activation` when constructing the `gemma3_mm::Config`. The
# providers crate re-exports `VarBuilder` but not the full `candle_nn`
# surface, so we depend on it directly here. The `wgpu` feature is
# pulled in transitively via `brainwires-provider/candle-wgpu`.
candle-nn = { version = "0.11", default-features = false }

# HF tokenizer with `unstable_wasm` for wasm32 target. The provider crate
# already pulls tokenizers in with `fancy-regex`; declaring it here adds the
# wasm feature without disturbing the native build.
tokenizers = { version = "0.22", default-features = false, features = ["unstable_wasm"] }

# WASM bindings
wasm-bindgen = "0.2"
js-sys = "0.3"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Performance",
    "ReadableStream",
    "ReadableStreamDefaultController",
    "SpeechSynthesis",
    "SpeechSynthesisUtterance",
    "SpeechSynthesisVoice",
    "SpeechRecognition",
    "SpeechRecognitionEvent",
    "SpeechRecognitionResult",
    "SpeechRecognitionResultList",
    "SpeechRecognitionAlternative",
    "SpeechRecognitionError",
] }

# Stream adapters (matches workspace pin used by the framework crates).
futures = "0.3"

# Trait support for the brainwires-llama TensorFetcher impl in opfs_fetcher.rs.
async-trait = "0.1.89"

# Serde
serde = { workspace = true, features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = { workspace = true }

# Panic hook for readable browser stack traces
console_error_panic_hook = "0.1"

# Pulled in transitively by uuid / rand-using crates; declaring keeps the
# `js` feature on the same getrandom 0.2 instance the dep graph picks.
getrandom = { version = "0.2", features = ["js"] }

# Base64 decode for inbound image parts in `local_chat_stream_with_image`.
# JS sends `{type:'image', data: <base64>}` parts; we decode inside wasm
# rather than over the postMessage boundary so the JS side stays small.
base64 = { workspace = true }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
