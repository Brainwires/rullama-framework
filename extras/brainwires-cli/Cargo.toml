[package]
name = "brainwires-cli"
version.workspace = true
edition.workspace = true
description = "An AI-powered agentic CLI tool for autonomous coding assistance"
license = "MIT"
authors = ["Brainwires Team"]
keywords = ["ai", "agent", "cli", "coding-assistant", "autonomous", "llm"]
repository = "https://github.com/brainwires/brainwires-framework"
homepage = "https://brainwires.studio/cli"
publish = false

[[bin]]
name = "brainwires"
path = "src/main.rs"
doc = false

[dependencies]
# Async runtime
tokio.workspace = true
tokio-util.workspace = true
futures.workspace = true
async-trait.workspace = true
async-stream.workspace = true

# CLI framework
clap = { version = "4", features = ["derive", "env", "color"] }
dialoguer = "0.11"
indicatif = "0.17"
console = "0.15"

# TUI framework
ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
crossterm = { version = "0.29", features = ["event-stream"] }
termimad = "0.34"

# TUI extension components (checkbox, button, input, dialogs)
# Uses local dev version — published 0.4.2 lacks CursorMode, ScrollMode, delete_word_forward, title()
ratatui-interact = { version = "0.5.2", features = ["clipboard"] }

# HTTP client
reqwest.workspace = true

# OpenSSL vendoring for cross-compilation
openssl = { version = "0.10", features = ["vendored"] }

# WebSocket
tokio-tungstenite.workspace = true

# Supabase
postgrest = "1.6"

# MCP Protocol
rmcp.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true
serde_yml.workspace = true
toml.workspace = true

# File operations
walkdir.workspace = true
glob.workspace = true
ignore.workspace = true
diffy.workspace = true

# Git
git2.workspace = true

# Clipboard
arboard = "3.4"

# Compression
zstd.workspace = true
flate2.workspace = true

# Utilities
anyhow.workspace = true
thiserror.workspace = true
regex.workspace = true
chrono.workspace = true
dirs.workspace = true
lazy_static = "1.5"
lru.workspace = true
sha2.workspace = true
base64.workspace = true
uuid.workspace = true
gethostname.workspace = true

# Password/crypto
bcrypt = "0.15"
hex.workspace = true
subtle.workspace = true
rand.workspace = true
keyring.workspace = true
zeroize.workspace = true
chacha20poly1305.workspace = true

# SQLite
rusqlite.workspace = true

# Logging/tracing
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Vector database
lancedb.workspace = true
arrow.workspace = true
arrow-array.workspace = true
arrow-schema.workspace = true

# Performance
rayon = "1.10"

# Glob pattern matching
globset = "0.4"

# Document processing
zip = "2.2"

# Schema validation
schemars.workspace = true

# URL parsing
url.workspace = true

# HTTP types
http.workspace = true
hyper.workspace = true
hyper-util.workspace = true
http-body-util.workspace = true
bytes.workspace = true

# Web scraping
scraper = "0.24"
parking_lot = "0.12"
urlencoding.workspace = true

# Adaptive prompting
ndarray.workspace = true
linfa.workspace = true
linfa-clustering.workspace = true
bincode.workspace = true

# Rhai scripting engine
rhai = { version = "1.23", features = ["sync", "serde"] }

# ── Brainwires Framework facade ──
brainwires = { path = "../../crates/brainwires", features = ["full"] }

# ── Brainwires Framework crates (custom feature flags) ──
brainwires-agent = { workspace = true }
brainwires-mdap = { workspace = true }
brainwires-skills = { workspace = true, features = ["registry"] }
brainwires-seal = { workspace = true }
brainwires-eval = { workspace = true }
brainwires-inference = { workspace = true }
brainwires-tool-runtime = { workspace = true, features = ["native", "orchestrator", "rag"] }
brainwires-tool-builtins = { workspace = true, features = ["native", "interpreters", "rag"] }
brainwires-knowledge = { workspace = true, features = ["alt-folder-name"] }
brainwires-rag = { workspace = true, features = ["documents"] }
brainwires-network = { workspace = true, features = ["auth-keyring"] }
brainwires-provider.workspace = true
brainwires-telemetry = { workspace = true, features = ["native"] }
brainwires-storage = { workspace = true, features = ["native"] }
brainwires-stores = { workspace = true, features = ["session", "task", "plan", "conversation", "memory", "lock", "image"] }
brainwires-memory = { workspace = true }
brainwires-core = { workspace = true, features = ["native"] }

petgraph = "0.8.3"
nix = { version = "0.30.1", features = ["term", "signal", "process"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Foundation", "Win32_System_Threading"] }

[dev-dependencies]
tempfile.workspace = true
tokio-test = "0.4"
mockito = "1.5"
assert_cmd = "2.0"
predicates = "3.1"
dotenvy = "0.15"
proptest = "1.5"

[features]
default = []
interpreter-javascript = []
interpreter-python = []
interpreter-all = ["interpreter-javascript", "interpreter-python"]
piston = []
bedrock = ["brainwires-provider/bedrock"]
vertex-ai = ["brainwires-provider/vertex-ai"]
llama-cpp-2 = ["brainwires-provider/llama-cpp-2"]
full = ["interpreter-all", "llama-cpp-2", "bedrock", "vertex-ai"]

[build-dependencies]
chrono = "0.4"
