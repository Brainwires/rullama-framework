[package]
name = "brainwires-memory-server"
publish = false
description = "Mem0-compatible memory REST API server for Brainwires agents"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "brainwires-memory-server"
path = "src/main.rs"
doc = false

[lib]
name = "brainwires_memory_server"
path = "src/lib.rs"

[dependencies]
# HTTP server
axum = { workspace = true }
tokio = { workspace = true }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Knowledge backend (LanceDB-backed thought store + tenant scoping)
brainwires-knowledge = { workspace = true, features = ["knowledge"] }

# Time + IDs
chrono = { workspace = true }
uuid = { workspace = true }

# Filesystem paths
dirs = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
reqwest = { workspace = true, features = ["json"] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full", "test-util"] }

[features]
default = []
