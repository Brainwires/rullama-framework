[package]
name = "brainwires-scheduler"
publish = false
description = "Local-machine MCP scheduler — cron-based job scheduling with optional Docker sandboxing"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "brainwires-scheduler"
path = "src/main.rs"

[lib]
name = "brainwires_scheduler"
path = "src/lib.rs"

[dev-dependencies]
tempfile = { workspace = true }
rmcp = { workspace = true, features = ["client", "server", "macros", "transport-io", "transport-streamable-http-server"] }
tokio = { workspace = true, features = ["io-util", "rt-multi-thread", "macros", "time"] }
serde_json = { workspace = true }
anyhow = { workspace = true }
uuid = { workspace = true }

[dependencies]
rmcp = { workspace = true, features = ["server", "macros", "transport-io", "transport-streamable-http-server"] }
# `fs`, `io-util`, `rt-multi-thread`, `macros`, `time` are all used by the
# scheduler lib (store.rs, daemon.rs). Without listing them here the lib
# only compiles when another workspace member activates tokio/fs via
# feature unification — which is exactly why `cargo test -p brainwires-scheduler`
# (without `--workspace`) used to fail with "no `fs` in tokio".
tokio = { workspace = true, features = ["fs", "io-util", "rt-multi-thread", "macros", "time"] }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
chrono = { workspace = true }
uuid = { workspace = true }
dirs = { workspace = true }
clap = { version = "4", features = ["derive"] }
cron = "0.15"
axum = "0.8"
