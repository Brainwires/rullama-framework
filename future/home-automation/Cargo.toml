[workspace]
resolver = "2"
members = ["brainwires-homeauto", "matter-tool"]

[workspace.package]
version = "0.11.0"
edition = "2024"
rust-version = "1.91"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Brainwires/rullama-framework"
homepage = "https://brainwires.net"
authors = ["Brainwires Contributors"]

[workspace.dependencies]
# Core async + serde + diagnostics
tokio = { version = "1.43", features = ["full"] }
async-trait = "0.1"
async-stream = "0.3"
tokio-stream = "0.1"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"

# Zigbee + Z-Wave serial transport
tokio-serial = "5.4"
crc = "3"
bytes = "1"

# Thread Border Router REST client
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

# Matter discovery + crypto
mdns-sd = "0.12"
gethostname = "1.0"
p256 = { version = "0.13.2", features = ["ecdh", "ecdsa", "arithmetic"] }
ecdsa = { version = "0.16.9", features = ["der", "signing", "verifying"] }
hmac = "0.12.1"
hkdf = "0.12.4"
pbkdf2 = { version = "0.12.2", features = ["hmac"] }
aes = "0.8.4"
ccm = { version = "0.5.0", features = ["std"] }
der = { version = "0.8.0", features = ["alloc", "derive"] }
pkcs8 = { version = "0.10.2", features = ["alloc"] }
sha2 = "0.10"
rand_core = { version = "0.6", features = ["getrandom"] }
zeroize = { version = "1", features = ["derive"] }
hex = "0.4"

# Matter over BLE
btleplug = "0.11"
uuid = { version = "1", features = ["v4", "serde"] }

# matter-tool deps
clap = { version = "4", features = ["derive"] }
dirs = "6"

# Dev
tempfile = "3"
wiremock = "0.6"
ctrlc = { version = "3", features = ["termination"] }
