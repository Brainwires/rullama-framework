[package]
name = "brainwires-homeauto"
description = "Home automation protocols (Matter, Zigbee, Z-Wave, Thread) — deferred from brainwires-hardware in v0.11"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
publish = false
readme = "../README.md"

[dependencies]
# Always
async-trait = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

# Zigbee + Z-Wave serial transport
tokio-serial = { workspace = true, optional = true }
crc = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
async-stream = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }

# Thread OTBR REST API
reqwest = { workspace = true, optional = true }

# Matter discovery + crypto
mdns-sd = { workspace = true, optional = true }
gethostname = { workspace = true, optional = true }
p256 = { workspace = true, optional = true }
ecdsa = { workspace = true, optional = true }
hmac = { workspace = true, optional = true }
hkdf = { workspace = true, optional = true }
pbkdf2 = { workspace = true, optional = true }
aes = { workspace = true, optional = true }
ccm = { workspace = true, optional = true }
der = { workspace = true, optional = true }
pkcs8 = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
rand_core = { workspace = true, optional = true }
zeroize = { workspace = true, optional = true }
hex = { workspace = true, optional = true }

# Matter over BLE
btleplug = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }

[features]
default = []

zigbee = [
    "dep:tokio-serial",
    "dep:crc",
    "dep:bytes",
    "dep:async-stream",
    "dep:tokio-stream",
]

zwave = [
    "dep:tokio-serial",
    "dep:bytes",
    "dep:async-stream",
    "dep:tokio-stream",
]

thread = ["dep:reqwest"]

matter = [
    "dep:mdns-sd",
    "dep:gethostname",
    "dep:tokio-stream",
    "dep:async-stream",
    "dep:p256",
    "dep:ecdsa",
    "dep:hmac",
    "dep:hkdf",
    "dep:pbkdf2",
    "dep:aes",
    "dep:ccm",
    "dep:der",
    "dep:pkcs8",
    "dep:sha2",
    "dep:rand_core",
    "dep:zeroize",
    "dep:hex",
]

matter-ble = ["matter", "dep:btleplug", "dep:uuid"]

all = ["zigbee", "zwave", "thread", "matter", "matter-ble"]

[dev-dependencies]
anyhow = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
ctrlc = { workspace = true }
wiremock = { workspace = true }
p256 = { workspace = true }
rand_core = { workspace = true }

[[example]]
name = "matter_on_off"
required-features = ["matter"]

[[example]]
name = "matter_server"
required-features = ["matter"]

[[example]]
name = "zigbee_scan"
required-features = ["zigbee"]

[[example]]
name = "zwave_nodes"
required-features = ["zwave"]

[[example]]
name = "thread_info"
required-features = ["thread"]

[[test]]
name = "matter_integration"
required-features = ["matter"]
