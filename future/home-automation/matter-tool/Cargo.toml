[package]
name = "matter-tool"
description = "Commission and control Matter 1.3 devices using the rullama Matter stack"
version.workspace = true
edition.workspace = true
publish = false
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"

[[bin]]
name = "matter-tool"
path = "src/main.rs"

[features]
default = []
# BLE commissioning window (btleplug peripheral, Linux/macOS)
ble = ["rullama-homeauto/matter-ble"]

[dependencies]
rullama-homeauto = { path = "../rullama-homeauto", features = ["matter"] }
tokio = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde_json = { workspace = true }
dirs = { workspace = true }
hex = { workspace = true }
clap = { workspace = true }
mdns-sd = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
