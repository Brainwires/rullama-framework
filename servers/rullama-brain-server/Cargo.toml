[package]
name = "rullama-brain-server"
publish = false
description = "Open Brain MCP server binary — exposes persistent knowledge (thoughts, PKS, BKS) to any AI tool via MCP protocol"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true
documentation = "https://docs.rs/rullama-brain-server"

[lib]
name = "rullama_brain_server"
path = "src/lib.rs"

[[bin]]
name = "rullama-brain"
path = "src/main.rs"
doc = false

[dependencies]
rullama-knowledge = { workspace = true, features = ["knowledge"] }
rmcp = { workspace = true, features = ["server", "transport-io", "macros"] }
schemars.workspace = true
tokio-util.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = { workspace = true }
rmcp = { workspace = true, features = ["client", "server", "transport-io", "macros"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "io-util"] }
serde_json = { workspace = true }
anyhow = { workspace = true }
uuid = { workspace = true }
